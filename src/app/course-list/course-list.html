<div class="container mt-4">
  <h2 class="text-center mb-4">Course Selection</h2>

  <div class="row">
    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h4 class="text-primary">Available Courses</h4>
        <ul class="list-group">
          <li *ngFor="let c of available" class="list-group-item d-flex justify-content-between align-items-center">
            {{ c }}
            <button (click)="addCourse(c)" class="btn btn-sm btn-primary">
              Add <i class="bi bi-plus-circle"></i>
            </button>
          </li>
        </ul>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3 shadow-sm card-ui">
        <h4 class="text-success">Selected Courses</h4>
        <ul class="list-group">
          <li *ngFor="let c of selected" class="list-group-item d-flex justify-content-between align-items-center">
            {{ c }}
            <button (click)="removeCourse(c)" class="btn btn-sm btn-primary">
              Remove <i class="bi bi-trash"></i>
            </button>
          </li>
        </ul>
        
        <button *ngIf="selected.length > 0" (click)="submit()" class="btn btn-primary mt-3 w-100">
          Confirm & Proceed
        </button>
      </div>
    </div>
  </div>
</div>
