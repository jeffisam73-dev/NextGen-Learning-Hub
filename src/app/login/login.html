<div class="login-container">

  <div class="login-box">

    <h3 class="login-title">Sign In</h3>

    <div class="input-group">
      <span class="input-group-text">
        <i class="bi bi-person"></i>
      </span>
      <input type="text" class="form-control" placeholder="Username">
    </div>

    <br>

    <div class="input-group">
      <span class="input-group-text">
        <i class="bi bi-lock"></i>
      </span>
      <input type="password" class="form-control" placeholder="Password">
    </div>

    <br>

    <button routerLink="/courses" class="btn btn-primary w-100 login-btn">
      Login
    </button>

    <br>

    <div class="forgot-links">
      <a routerLink="/forgot" class="forgot-password-link">Forgot Password?</a>
    </div>

    <hr>

    <div class="signup-section">
      <p class="signup-text">New to our platform?</p>
      <button routerLink="/signup" class="btn btn-success register-btn w-100">
        Create New Account <i class="bi bi-person-plus"></i>
      </button>
    </div>

  </div>

</div>
