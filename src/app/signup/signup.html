<div class="signup-container">
  <div class="signup-box">

    <h3 class="signup-title">Student Registration</h3>

    <div class="form-group">
      <label for="firstName" class="form-label">First Name</label>
      <input type="text" class="form-control" id="firstName" placeholder="Enter your first name">
    </div>

    <div class="form-group">
      <label for="mobileNo" class="form-label">Mobile Number</label>
      <input type="tel" class="form-control" id="mobileNo" placeholder="Enter your mobile number">
    </div>

    <div class="form-group">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" class="form-control" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter password">
    </div>

    <div class="form-group">
      <label for="confirmPassword" class="form-label">Confirm Password</label>
      <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password">
    </div>

    <button routerLink="/login" class="btn btn-primary w-100 signup-btn">
      Register
    </button>

    <div class="login-link">
      <p>Already have an account? <a routerLink="/login" class="link-text">Sign In here</a></p>
    </div>

  </div>
</div>
