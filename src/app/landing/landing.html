<div class="container mt-5">

  <h1 class="text-center mb-4 text-primary">
    Online Course Management System
  </h1>

  <div class="row">

    <!-- Signup -->
    <div class="col-md-3">
      <div class="card shadow p-3 text-center">

        <h4>New Signup</h4>

        <p>Create new student account</p>

        <button routerLink="/signup"
          class="btn btn-success w-100">
          Signup
        </button>

      </div>
    </div>


    <!-- Login -->
    <div class="col-md-3">
      <div class="card shadow p-3 text-center">

        <h4>Sign In</h4>

        <p>Login to system</p>

        <button routerLink="/login"
          class="btn btn-primary w-100">
          Login
        </button>

      </div>
    </div>


    <!-- Registration -->
    <div class="col-md-3">
      <div class="card shadow p-3 text-center">

        <h4>Student Registration</h4>

        <p>Register for course</p>

        <button routerLink="/courses"
          class="btn btn-warning w-100">
          Register
        </button>

      </div>
    </div>


    <!-- Forgot -->
    <div class="col-md-3">
      <div class="card shadow p-3 text-center">

        <h4>Forgot Password</h4>

        <p>Reset password</p>

        <button routerLink="/forgot"
          class="btn btn-danger w-100">
          Reset
        </button>

      </div>
    </div>

  </div>

</div>
